name: Deploy to Vercel
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install -g vercel@latest
      - run: vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }} --scope=brunel-studios-team --name=thryv-v2
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
